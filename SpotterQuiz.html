<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Szenenkenner Challenge — Luzerner Polizei</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Arial',sans-serif;background:#0a0f1e;color:#fff;min-height:100vh;user-select:none}
.scorebar{display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:#111827;border-bottom:2px solid #1e2d47;position:sticky;top:0;z-index:100}
.score-team{display:flex;align-items:center;gap:12px}
.score-name{font-size:16px;font-weight:800;letter-spacing:.5px}
.score-pts{font-size:38px;font-weight:900;line-height:1;min-width:60px;text-align:center}
.score-A .score-name,.score-A .score-pts{color:#60a5fa}
.score-B .score-name,.score-B .score-pts{color:#f87171}
.score-mid{text-align:center}
.round-badge{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:1px}
.q-counter{font-size:22px;font-weight:900;color:#fff;margin-top:2px}
.progress-bar{height:4px;background:#1e2d47;border-radius:2px;width:160px;margin:6px auto 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:2px;transition:width .4s}
.main{padding:40px 60px;max-width:1100px;margin:0 auto}
.q-phase-badge{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#8b5cf6;margin-bottom:16px}
.q-text{font-size:34px;font-weight:800;line-height:1.3;color:#fff;margin-bottom:36px;text-align:center}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:36px}
.opt-card{padding:20px 24px;background:#1e2d47;border:2px solid #2d3f5c;border-radius:14px;font-size:18px;font-weight:600;line-height:1.35;display:flex;gap:12px;align-items:center;transition:all .2s}
.opt-letter{font-weight:900;color:#6b7280;font-size:14px;min-width:20px}
.opt-card.correct{background:#1a3a20;border-color:#22c55e;color:#86efac}
.opt-card.correct .opt-letter{color:#22c55e}
.opt-card.hidden{opacity:0;pointer-events:none}
.point-btns{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.team-panel{background:#111827;border-radius:16px;padding:20px;border:2px solid #1e2d47}
.team-panel-name{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;text-align:center}
.team-panel.panel-A .team-panel-name{color:#60a5fa}
.team-panel.panel-B .team-panel-name{color:#f87171}
.btn-row{display:flex;gap:10px}
.btn-pts{flex:1;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:800;cursor:pointer;transition:transform .1s}
.btn-pts:hover{transform:scale(1.04)}
.btn-pts:active{transform:scale(.96)}
.btn-plus2{background:#1a4a2a;color:#86efac;border:2px solid #22c55e}
.btn-plus1{background:#1e3a5f;color:#93c5fd;border:2px solid #3b82f6}
.btn-minus{background:#4a1a1a;color:#fca5a5;border:2px solid #ef4444}
.pts-label{font-size:11px;color:#6b7280;margin-bottom:4px;text-align:center}
.controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.ctrl-btn{padding:12px 24px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.ctrl-btn:hover{transform:scale(1.03)}
.btn-reveal-opts{background:#4c1d95;color:#c4b5fd}
.btn-reveal-ans{background:#7c2d12;color:#fed7aa}
.btn-next{background:#14532d;color:#86efac;font-size:18px;padding:14px 36px}
.btn-undo{background:#1e2d47;color:#9ca3af;font-size:13px}
.answer-revealed{background:#1a3a20;border:2px solid #22c55e;border-radius:14px;padding:20px 28px;margin-bottom:20px;font-size:20px;font-weight:800;color:#86efac;text-align:center}
.round-intro{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85vh;text-align:center;padding:40px}
.round-emoji-big{font-size:80px;margin-bottom:20px}
.round-intro-title{font-size:40px;font-weight:900;margin-bottom:40px}
.btn-go{padding:16px 48px;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:14px;color:#fff;font-size:20px;font-weight:800;cursor:pointer}
.final{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85vh;text-align:center;padding:40px}
.final-trophy{font-size:100px;margin-bottom:24px}
.final-title{font-size:48px;font-weight:900;margin-bottom:8px}
.final-teams{display:flex;gap:32px;margin:40px 0;flex-wrap:wrap;justify-content:center}
.final-team{background:#111827;border-radius:20px;padding:40px 48px;min-width:220px;border:3px solid #1e2d47}
.final-team.winner{border-color:#f59e0b;background:#1a1500}
.final-pts-big{font-size:80px;font-weight:900;line-height:1}
.final-winner{font-size:28px;color:#f59e0b;margin-top:8px}
.advantage-box{background:#1a2f1a;border:2px solid #22c55e;border-radius:16px;padding:24px 40px;margin-bottom:32px}
.adv-label{font-size:12px;font-weight:700;color:#22c55e;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.adv-val{font-size:52px;font-weight:900;color:#86efac}
.adv-sub{font-size:13px;color:#6b7280;margin-top:4px}
.btn-restart{padding:16px 40px;background:#3b82f6;border:none;border-radius:12px;color:#fff;font-size:18px;font-weight:800;cursor:pointer}
.setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px;text-align:center}
.setup-logo{font-size:72px;margin-bottom:20px}
.setup-title{font-size:40px;font-weight:900;margin-bottom:6px}
.setup-sub{font-size:15px;color:#6b7280;margin-bottom:50px}
.setup-card{background:#111827;border-radius:20px;padding:36px 40px;width:100%;max-width:500px;border:1px solid #1e2d47}
.lbl{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:8px;text-align:left}
.inp{width:100%;padding:14px 16px;background:#0a0f1e;border:2px solid #1e2d47;border-radius:10px;color:#fff;font-size:16px;margin-bottom:20px;outline:none}
.inp:focus{border-color:#3b82f6}
.btn-start{width:100%;padding:16px;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:12px;color:#fff;font-size:18px;font-weight:800;cursor:pointer}
.hotkey-hint{font-size:11px;color:#374151;margin-top:12px;text-align:center}
</style>
</head>
<body>
<div id="app"></div>
<script>
const QUESTIONS = [
  {q:"In welchem Jahr gewann der FC Luzern seinen bisher einzigen Schweizer Meistertitel?",opts:["1984","1989","1993","1997"],a:1},
  {q:"Wie oft hat der FC Luzern den Schweizer Cup bisher gewonnen?",opts:["1 Mal","2 Mal","3 Mal","4 Mal"],a:2},
  {q:"Gegen wen gewann der FCL 2021 den Schweizer Cup und mit welchem Resultat?",opts:["YB 2:1","FC St. Gallen 3:1","FC Basel 2:0","FC Zürich 1:0"],a:1},
  {q:"Wer erzielte das 1:0 für den FCL im Cupfinal 2021?",opts:["Pascal Schürpf","Jordy Wehrmann","Ibrahima Ndiaye","Louis Schaub"],a:2},
  {q:"In welchem Jahr öffnete die swissporarena mit dem ersten Meisterschaftsspiel?",opts:["2009","2010","2011","2012"],a:2},
  {q:"Wer war der Gegner beim Einweihungsspiel der swissporarena?",opts:["FC Bayern München","Hamburger SV","Borussia Dortmund","1. FC Köln"],a:1},
  {q:"In welchem Interimsstadion spielte der FCL während des Baus der swissporarena?",opts:["Stadion Gersag, Emmenbrücke","Kleinfeld, Kriens","Sportpark Horw","Allmend provisorisch"],a:0},
  {q:"Wer nimmt nach einem Spotter-Ausbildungstag gerne mal die falschen Pillen ein? 💊",opts:["Baur","Stirnimann","Jones","Garattoni"],a:2},
  {q:"Zu welchem ausländischen Club wechselte FCL-Juwel Ardon Jashari?",opts:["Stade Rennais","Eintracht Frankfurt","FC Brügge","Sporting Lissabon"],a:2},
  {q:"In welchem Jahr gewann der FCL den zweiten Cupsieg und gegen wen?",opts:["1985 gegen YB","1990 gegen Basel","1992 gegen Lugano","1997 gegen Sion"],a:2},
  {q:"Wie heisst der aktuelle Präsident des FC Luzern?",opts:["Josef Bieri","Stefan Wolf","Michael Sigerist","Domenic Urech"],a:2},
  {q:"Wie heisst der Geschäftsführer (CEO) des FC Luzern?",opts:["Simon Laager","Laurent Prince","Michael Sigerist","Domenic Urech"],a:3},
  {q:"Wie heisst der neue Cheftrainer des FC Luzern ab Saison 2026/27?",opts:["Mario Frick","Fabio Celestini","Jörg «Udo» Portmann","Stefan Kobel"],a:2},
  {q:"Wie gross ist die Kapazität des Gästesektors in der swissporarena?",opts:["850","1025","1200","1450"],a:1},
  {q:"Welcher Spotter zeigte sich bei der Hamburger-Taufe auch schon nackt? 🍔",opts:["Silas","Marco","Nate","Aaron"],a:2},
  {q:"Welcher Spieler wechselt für die Saison 2026/27 vom FC Thun zum FC Luzern?",opts:["Pascal Schürpf","Leonardo Bertone","Nando Toggenburger","Silvan Hefti"],a:1},
  {q:"Wer wird neuer Assistenztrainer beim FC Luzern?",opts:["Roland Vrabec","Christian Schwegler","Daniel Gygax","Sandro Chieffo"],a:2},
  {q:"Von welcher Mannschaft stammt der Fan, der beim Gästeeinlass einen Böller in die Nullzone warf und beim darauffolgenden Spiel festgenommen wurde?",opts:["FC Basel","FC Zürich","BSC Young Boys","Servette FC"],a:3},
  {q:"Wie heisst ab 1. Juli 2026 neu das Stadion des FC Luzern?",opts:["Pilatus Arena","Thermoplan Arena","Luzern Allmend Arena","Zentralschweiz Arena"],a:1},
  {q:"Wie viele Cupsiege hat der Grasshopper Club Zürich?",opts:["13","16","19","22"],a:2},
  {q:"Wie viele Meistertitel in Folge gewann BSC Young Boys von 2018 bis 2024?",opts:["5","6","7","8"],a:2},
  {q:"In welchem Jahr wurde der SC Kriens (in heutiger Form) gegründet?",opts:["1920","1931","1944","1962"],a:2},
  {q:"Wann machte der SC Kriens den Aufstieg 2026 in die Challenge League perfekt?",opts:["12. April 2026","30. April 2026","23. Mai 2026","7. Juni 2026"],a:2},
  {q:"Gegen wen gewann der SC Kriens das entscheidende Aufstiegsspiel 2026?",opts:["FC Rapperswil-Jona","SC Brühl","U21 BSC Young Boys","FC Biel-Bienne"],a:2},
  {q:"Wie heisst der Trainer der 1. Mannschaft des SC Kriens?",opts:["Gianluca Frontino","René van Eck","Michael «Mike» Winsauer","Marco Schällibaum"],a:2},
  {q:"Wie viele Zuschauer fasst das Sportzentrum Kleinfeld in Kriens?",opts:["2'000","2'800","3'500","4'200"],a:2},
  {q:"Wie heisst der Torhütertrainer beim FC Luzern?",opts:["David Zibung","Vaso Vasic","Lorenzo Bucchi","Marco Storari"],a:2},
  {q:"Wer ist beim FC Luzern für die Haustechnik verantwortlich und schnitt schon mit einem Bolzenschneider die Kette auf, welche von den Fans vor dem Spiel als Protest für die Anspielzeiten am Tor befestigt wurde? 🔧",opts:["Hanspeter Meier","Alfred Köhler","Bruno Walther","Peter Keller"],a:1},
  {q:"Wann fand das für die Luzerner Polizei aufgrund der Ausschreitungen geschichtsträchtige Fussballspiel gegen den FC St. Gallen statt, bei dem Päuli Winiker Seite an Seite mit der OD-Kette und dem Wasserwerfer die Zentralstrasse entlangging?",opts:["14.03.2022","20.05.2023","08.10.2023","15.04.2024"],a:1},
  {q:"In welchem Jahr feierte der FC Luzern das 100-Jahr-Jubiläum mit einem Spiel gegen den FC Barcelona?",opts:["1997","2001","2005","2010"],a:1},
  {q:"Wer war der erste Fan-Arbeiter beim FC Luzern?",opts:["René Weibel","Christian Wandeler","Beat Müller","Thomas Keller"],a:1},
  {q:"Welcher Spotter fuhr schon auf dem doppelstöckigen Oranje-Fancar mit? 🚌",opts:["Jones","Stirnimann","Gara","Bertschi"],a:2},
  {q:"Gegen welche Mannschaft darf der FC Luzern gemäss Rahmenbewilligung kein Spiel an einem Freitag oder Samstag austragen?",opts:["BSC Young Boys","FC Zürich","FC Lugano","FC Sion"],a:1},
  {q:"Mit welcher Durchsage durch den Stadion-Speaker wird der Krisenstab in der swissporarena im Ereignisfall alarmiert?",opts:["Sicherheitsalarm Stufe 1","Code Red","UEFA Meeting","Interner Aufruf"],a:2}
];

const LETTERS = ['A','B','C','D'];
const ALL_Q = QUESTIONS.map((q,i)=>({...q,globalIdx:i}));
const TOTAL = ALL_Q.length;

let S = {phase:'setup',names:{A:'🔵 Spotter',B:'🔴 Ultras'},scores:{A:0,B:0},qIdx:0,showOpts:false,showAns:false,history:[]};

const addPts=(team,pts)=>{S.history.push({scores:{...S.scores}});S.scores[team]+=pts;render();};
const undo=()=>{if(S.history.length>0){S.scores=S.history.pop().scores;render();}};
const revealOpts=()=>{S.showOpts=true;render();};
const revealAns=()=>{S.showAns=true;render();};
const nextQ=()=>{
  if(S.qIdx+1>=TOTAL){S.phase='final';S.showOpts=false;S.showAns=false;render();return;}
  S.qIdx++;S.showOpts=false;S.showAns=false;render();
};

const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const render=()=>{document.getElementById('app').innerHTML=html();};

const html=()=>{
  if(S.phase==='setup') return renderSetup();
  if(S.phase==='final') return renderFinal();
  return renderGame();
};

const renderSetup=()=>`
<div class="setup">
  <div class="setup-logo">🚔</div>
  <div class="setup-title">Szenenkenner Challenge</div>
  <div class="setup-sub">Luzerner Polizei · Ausbildungstag 2026 · ${TOTAL} Fragen</div>
  <div class="setup-card">
    <label class="lbl">Name Team A (links)</label>
    <input class="inp" id="nameA" value="🔵 Spotter" placeholder="Team A">
    <label class="lbl">Name Team B (rechts)</label>
    <input class="inp" id="nameB" value="🔴 Ultras" placeholder="Team B">
    <button class="btn-start" onclick="startGame()">▶ Spiel starten</button>
  </div>
  <div style="margin-top:28px;font-size:13px;color:#374151;line-height:1.8">
    Ohne Optionen: richtig <strong style="color:#86efac">+2</strong> · falsch <strong style="color:#fca5a5">−2</strong><br>
    Mit Optionen: richtig <strong style="color:#93c5fd">+1</strong> · falsch <strong style="color:#fca5a5">−1</strong><br>
    Jeder Punkt = 30 Sek. Vorsprung beim Stadtspiel
  </div>
</div>`;

const renderGame=()=>{
  const q=ALL_Q[S.qIdx];
  const progressPct=((S.qIdx)/TOTAL*100).toFixed(0);
  const optsHtml=q.opts.map((o,i)=>`
    <div class="opt-card ${S.showAns&&i===q.a?'correct':''} ${!S.showOpts&&!S.showAns?'hidden':''}">
      <span class="opt-letter">${LETTERS[i]}</span>${esc(o)}
    </div>`).join('');
  const ansBox=S.showAns?`<div class="answer-revealed">✓ Richtige Antwort: ${LETTERS[q.a]} — ${esc(q.opts[q.a])}</div>`:'';
  const panel=(team,cls)=>{
    const isOpen=!S.showOpts&&!S.showAns;
    return `<div class="team-panel ${cls}">
      <div class="team-panel-name">${esc(S.names[team])}</div>
      ${isOpen?`<div class="pts-label">Ohne Optionen (±2)</div>
        <div class="btn-row">
          <button class="btn-pts btn-plus2" onclick="addPts('${team}',2)">+2 ✓</button>
          <button class="btn-pts btn-minus" onclick="addPts('${team}',-2)">−2 ✗</button>
        </div>`:`<div class="pts-label">Mit Optionen (±1)</div>
        <div class="btn-row">
          <button class="btn-pts btn-plus1" onclick="addPts('${team}',1)">+1 ✓</button>
          <button class="btn-pts btn-minus" onclick="addPts('${team}',-1)">−1 ✗</button>
        </div>`}
    </div>`;
  };
  return `
  <div class="scorebar">
    <div class="score-team score-A">
      <div><div class="score-name">${esc(S.names.A)}</div><div class="score-pts">${S.scores.A}</div></div>
    </div>
    <div class="score-mid">
      <div class="round-badge">🚔 Szenenkenner Challenge</div>
      <div class="q-counter">Frage ${S.qIdx+1} / ${TOTAL}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    </div>
    <div class="score-team score-B">
      <div style="text-align:right"><div class="score-name">${esc(S.names.B)}</div><div class="score-pts">${S.scores.B}</div></div>
    </div>
  </div>
  <div class="main">
    <div class="q-phase-badge">Frage ${S.qIdx+1} von ${TOTAL}</div>
    <div class="q-text">${esc(q.q)}</div>
    <div class="opts-grid">${optsHtml}</div>
    ${ansBox}
    <div class="point-btns">${panel('A','panel-A')}${panel('B','panel-B')}</div>
    <div class="controls">
      ${!S.showOpts&&!S.showAns?`<button class="ctrl-btn btn-reveal-opts" onclick="revealOpts()">📋 Antwortmöglichkeiten zeigen  [O]</button>`:''}
      ${!S.showAns?`<button class="ctrl-btn btn-reveal-ans" onclick="revealAns()">✓ Antwort aufdecken  [A]</button>`:''}
      ${S.showAns?`<button class="ctrl-btn btn-next" onclick="nextQ()">${S.qIdx+1<TOTAL?'→ Nächste Frage  [→]':'🏁 Ergebnis zeigen'}</button>`:''}
      <button class="ctrl-btn btn-undo" onclick="undo()">↩ Rückgängig  [Z]</button>
    </div>
    <div class="hotkey-hint">Tastatur: O = Optionen · A = Antwort · → / Leertaste = Weiter · Z = Rückgängig</div>
  </div>`;
};

const renderFinal=()=>{
  const A=S.scores.A,B=S.scores.B;
  const winner=A>B?'A':B>A?'B':null;
  const diff=Math.abs(A-B);
  const advSecs=diff*30;
  const advStr=advSecs>=60?`${Math.floor(advSecs/60)} Min.${advSecs%60>0?' '+advSecs%60+' Sek.':''}`:advSecs+' Sek.';
  return `
  <div class="final">
    <div class="final-trophy">${winner?'🏆':'🤝'}</div>
    <div class="final-title">${winner?esc(S.names[winner])+' gewinnt!':'Unentschieden!'}</div>
    <div class="final-teams">
      <div class="final-team ${winner==='A'?'winner':''}">
        <div style="font-size:22px;margin-bottom:10px">${esc(S.names.A)}</div>
        <div class="final-pts-big" style="color:#60a5fa">${A}</div>
        ${winner==='A'?'<div class="final-winner">🏆 Sieger!</div>':''}
      </div>
      <div class="final-team ${winner==='B'?'winner':''}">
        <div style="font-size:22px;margin-bottom:10px">${esc(S.names.B)}</div>
        <div class="final-pts-big" style="color:#f87171">${B}</div>
        ${winner==='B'?'<div class="final-winner">🏆 Sieger!</div>':''}
      </div>
    </div>
    ${winner?`<div class="advantage-box">
      <div class="adv-label">⏱️ Vorsprung beim Stadtspiel</div>
      <div class="adv-val">${advStr}</div>
      <div class="adv-sub">${diff} Punkt${diff!==1?'e':''} × 30 Sek. · ${esc(S.names[winner])} startet früher</div>
    </div>`:`<div class="advantage-box"><div class="adv-label">Gleichstand</div><div class="adv-val">Gleichzeitiger Start!</div></div>`}
    <button class="btn-restart" onclick="restart()">🔄 Nochmals spielen</button>
  </div>`;
};

window.startGame=()=>{
  S.names.A=document.getElementById('nameA').value.trim()||'🔵 Spotter';
  S.names.B=document.getElementById('nameB').value.trim()||'🔴 Ultras';
  S.phase='question';render();
};
window.addPts=addPts;
window.undo=undo;
window.revealOpts=revealOpts;
window.revealAns=revealAns;
window.nextQ=nextQ;
window.restart=()=>{S={phase:'setup',names:{A:'🔵 Spotter',B:'🔴 Ultras'},scores:{A:0,B:0},qIdx:0,showOpts:false,showAns:false,history:[]};render();};

document.addEventListener('keydown',e=>{
  if(S.phase!=='question')return;
  if(e.key==='o'||e.key==='O'){if(!S.showOpts)revealOpts();}
  if(e.key==='a'||e.key==='A'){if(!S.showAns)revealAns();}
  if((e.key==='ArrowRight'||e.key===' ')&&S.showAns)nextQ();
  if(e.key==='z'||e.key==='Z')undo();
  e.preventDefault();
});

render();
</script>
</body>
</html>
