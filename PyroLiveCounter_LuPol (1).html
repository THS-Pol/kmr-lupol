<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Pyro Live">
<meta name="theme-color" content="#0f1a2e">
<title>Pyro Live Counter — LuPol</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{background:#0f1a2e;color:#fff;min-height:100vh}
.app{max-width:420px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:#0f1a2e;padding:10px 14px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0;z-index:50}
.hdr h1{font-size:15px;font-weight:900}.hdr p{font-size:10px;opacity:.5;margin-top:1px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#27ae60;animation:pulse 2s infinite}
.sync-dot.old{background:#e74c3c;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.badge{background:rgba(255,255,255,.1);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700}
.tabs{display:flex;background:#0a1220;border-bottom:1px solid rgba(255,255,255,.08)}
.tab{flex:1;padding:9px 4px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.4);transition:.15s}
.tab.on{color:#fff;border-bottom:2px solid #3498db}
.phase-bar{display:flex;overflow-x:auto;gap:6px;padding:8px 12px;background:#0a1220;scrollbar-width:none}
.phase-bar::-webkit-scrollbar{display:none}
.phase-btn{flex-shrink:0;padding:6px 13px;font-size:11px;font-weight:700;border:none;border-radius:20px;cursor:pointer;background:rgba(255,255,255,.08);color:rgba(255,255,255,.55);white-space:nowrap}
.phase-btn.on{background:#3498db;color:#fff}
.clock-bar{background:#111f35;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07)}
.clock-val{font-size:28px;font-weight:900;font-family:monospace;color:#3498db}
.clock-val.tick{color:#27ae60}
.cbtn{padding:7px 13px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.1);color:#fff}
.cbtn.go{background:#27ae60}.cbtn.stop{background:#e74c3c}
.team-tog{display:flex;padding:8px 12px;background:#0a1220;gap:0}
.tbtn{flex:1;padding:12px;font-size:15px;font-weight:800;border:none;cursor:pointer;background:rgba(255,255,255,.06);color:rgba(255,255,255,.45);transition:.15s}
.tbtn:first-child{border-radius:10px 0 0 10px}
.tbtn:last-child{border-radius:0 10px 10px 0}
.tbtn.heim.on{background:#1a7a4a;color:#fff}
.tbtn.gast.on{background:#7a1a1a;color:#fff}
.pyro-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 12px}
.pbtn{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:14px;padding:16px 10px 12px;cursor:pointer;text-align:center;transition:all .12s;min-height:115px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pbtn:active{transform:scale(.93)}
.pbtn.flash{animation:pfl .45s ease-out}
@keyframes pfl{0%{transform:scale(1.08);filter:brightness(1.5)}100%{transform:scale(1);filter:brightness(1)}}
.p-emoji{font-size:34px;line-height:1;margin-bottom:3px}
.p-lbl{font-size:13px;font-weight:800;margin-bottom:1px}
.p-desc{font-size:9px;opacity:.5;margin-bottom:5px}
.p-cnt{font-size:32px;font-weight:900;line-height:1}
.p-cnt.z{opacity:.2}
.recent{background:#0a1220;padding:8px 12px;border-top:1px solid rgba(255,255,255,.06)}
.r-title{font-size:9px;font-weight:700;opacity:.4;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.erow{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.erow:last-child{border:none}
.erow.dp{opacity:.35}
.e-em{font-size:15px;flex-shrink:0}
.e-info{flex:1;font-size:11px;line-height:1.35}
.e-who{font-size:9px;opacity:.4}
.dbtn{background:rgba(255,80,80,.2);color:#ff7070;border:none;border-radius:4px;padding:3px 8px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap}
.dbtn.ok{background:rgba(80,200,80,.15);color:#6eff86}
/* LOG */
.log-wrap{flex:1;overflow-y:auto;padding:10px 12px 80px}
.lcard{border-radius:9px;padding:10px 12px;margin-bottom:6px;border-left:3px solid;background:rgba(255,255,255,.05)}
.lcard.heim{border-color:#27ae60}.lcard.gast{border-color:#e74c3c}
.lcard.dp{opacity:.45;background:rgba(255,50,50,.07)}
.lmain{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.ldtl{font-size:10px;opacity:.45;margin-top:3px}
.dbtl{padding:4px 10px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;background:rgba(255,80,80,.2);color:#ff7070;flex-shrink:0}
.dbtl.on{background:rgba(80,200,80,.15);color:#6eff86}
/* SUMMARY */
.sum-wrap{padding:10px 12px 80px;flex:1;overflow-y:auto}
.sc{background:rgba(255,255,255,.05);border-radius:10px;padding:12px;margin-bottom:10px}
.sc-t{font-size:10px;font-weight:800;opacity:.5;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.sr{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.sr:last-child{border:none}
.sn{font-size:20px;font-weight:900}
.sn.z{opacity:.2;font-size:14px}
.kmr{background:#1a3560;border-radius:10px;padding:14px;font-size:11px;font-family:monospace;line-height:2;margin-top:10px}
/* SETUP */
.setup{padding:24px 20px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}
.fgrp{margin-bottom:14px}
.fgrp label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.55;display:block;margin-bottom:4px}
.fgrp input,.fgrp select{width:100%;padding:11px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:9px;font-size:15px;color:#fff;outline:none;-webkit-appearance:none}
.fgrp select option{background:#1a3560}
.sbtn{width:100%;padding:16px;background:#3498db;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:900;cursor:pointer;margin-top:8px}
.sbtn:disabled{background:rgba(255,255,255,.1);cursor:default}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const PYRO=[
  {id:'HLF',  emoji:'🔥',label:'HLF',     desc:'Handlichtfackel', color:'#e74c3c'},
  {id:'RAUCH',emoji:'💨',label:'Rauch',    desc:'Rauchbombe',      color:'#95a5a6'},
  {id:'FW',   emoji:'✨',label:'Feuerwerk',desc:'Feuerwerk',       color:'#9b59b6'},
  {id:'BOEL', emoji:'⚡',label:'Böller',   desc:'Böller/Knaller',  color:'#f39c12'},
  {id:'BLITZ',emoji:'💥',label:'Blitzer',  desc:'Blitzknaller',    color:'#e67e22'},
];
const PHASES=[
  {id:'VOR', label:'Vor dem Spiel',     hasMin:true, offset:0},
  {id:'WAHR',label:'Während dem Spiel', hasMin:true, offset:0},
  {id:'NACH',label:'Nach dem Spiel',    hasMin:true, offset:0},
];
const SPOTS=[
  {id:'LU01',n:'BUHOLZER Marc'},{id:'LU04',n:'GARATTONI Roger'},
  {id:'LU08',n:'STIRNIMANN Christian'},{id:'LU10',n:'LINDEGGER Patrick'},
  {id:'LU13',n:'MAURER Jonas'},{id:'LU16',n:'BERTSCHI Silas'},
  {id:'LU18',n:'KERBER Philippe'},{id:'LU19',n:'STADELMANN Thierry'},
  {id:'LU22',n:'WICKI Daniel'},
];
// Datum aus URL-Parameter lesen (gesetzt vom KMR)
const urlParams = new URLSearchParams(window.location.search);
const matchDatum = urlParams.get('datum') || new Date().toISOString().split('T')[0];
const KEY = `pyro-${matchDatum}`;

// ===== PASSWORTSCHUTZ =====
const APP_PW = '1825';
let pyroAuth = false;
try { pyroAuth = localStorage.getItem('kmr_pw') === APP_PW; } catch(e) {}
const checkPyroPW = () => {
  const val = document.getElementById('ppw').value;
  if (val === APP_PW) {
    pyroAuth = true;
    try { localStorage.setItem('kmr_pw', APP_PW); } catch(e) {}
    render();
  } else {
    const inp = document.getElementById('ppw');
    inp.style.borderColor = '#e74c3c'; inp.value = '';
    inp.placeholder = 'Falsches Passwort';
    setTimeout(()=>{ inp.style.borderColor='rgba(255,255,255,.2)'; inp.placeholder='Passwort'; }, 2000);
  }
};

let S={
  setup:true,myId:'',myName:'',
  heim: urlParams.get('heim') || 'FC Luzern',
  gast: urlParams.get('gast') || '',
  phase:'VOR',team:'HEIM',view:'COUNT',events:[],
  clock:{running:false,startTs:null,off:0,manual:''},
  lastSync:null,
};
let pollT=null,clockT=null,flashIds=new Set();
const uid=()=>`${Date.now()}-${Math.random().toString(36).substr(2,6)}`;
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// Apps Script URL — aus URL-Parameter oder hardcoded
const SHEETS_URL = urlParams.get('sheets') || 'https://script.google.com/macros/s/AKfycbz3voR-WzgqQbaic_GAiwWkeqME0UaPkl3G_jEl-PCKQMhEP1w2SmDrrZAtJu5QRocp/exec';

// Lokalen Zustand speichern (inkl. Spieluhr)
const saveLocal = () => {
  try {
    localStorage.setItem(KEY, JSON.stringify({
      events: S.events,
      heim: S.heim, gast: S.gast,
      clock: S.clock, ts: Date.now()
    }));
  } catch(e) {}
};

// Einzelnes Event an Apps Script senden (GET — kein CORS-Problem)
const syncEvent = (ev) => {
  if (!SHEETS_URL) return;
  fetch(`${SHEETS_URL}?action=addPyroEvent&key=${encodeURIComponent(KEY)}&event=${encodeURIComponent(JSON.stringify(ev))}`)
    .catch(()=>{});
};

// Alle Events vom Server laden und mergen
const load = async () => {
  if (!SHEETS_URL) { render(); return; }
  try {
    const r = await fetch(`${SHEETS_URL}?action=loadPyro&key=${encodeURIComponent(KEY)}`);
    if (r.ok) {
      const remote = JSON.parse(await r.text());
      if (Array.isArray(remote) && remote.length > 0) {
        const lids = new Set(S.events.map(e => e.id));
        remote.forEach(e => { if (!lids.has(e.id)) S.events.push(e); });
        // Dupl-Flags synchronisieren
        S.events.forEach(e => {
          const rv = remote.find(x => x.id === e.id);
          if (rv) e.dupl = rv.dupl;
        });
        S.events.sort((a,b) => b.ts - a.ts);
        S.lastSync = Date.now();
        saveLocal();
      }
    }
  } catch(e) {}
  render();
};

// CLOCK
const clockMin=()=>{
  if(!S.clock.running)return S.clock.manual||null;
  const el=(Date.now()-(S.clock.startTs||0))/60000;
  return Math.floor(S.clock.off+el);
};
const startClock=ph=>{
  const p=PHASES.find(x=>x.id===ph);
  S.clock={running:true,startTs:Date.now(),off:p?.offset||0,manual:''};
  saveLocal();
  if(clockT)clearInterval(clockT);
  clockT=setInterval(()=>{if(S.view==='COUNT')renderContent();},10000);
};
const stopClock=()=>{
  if(S.clock.running){
    // Freeze current minute so it persists
    S.clock.off=clockMin()||0;
    S.clock.startTs=null;
    S.clock.running=false;
  }
  if(clockT){clearInterval(clockT);clockT=null;}
  saveLocal();
};

// EVENTS
const addEvent=type=>{
  const m=clockMin();
  const ev={id:uid(),type,team:S.team,phase:S.phase,minute:m!=null?String(m):'—',spotter:S.myId,spotterName:S.myName,ts:Date.now(),dupl:false};
  S.events.unshift(ev);
  saveLocal();
  syncEvent(ev);   // einzelnes Event → Apps Script
  flashIds.add(ev.id);
  setTimeout(()=>{flashIds.delete(ev.id);renderContent();},500);
  render();
};
const togDupl=id=>{const ev=S.events.find(x=>x.id===id);if(ev){ev.dupl=!ev.dupl;saveLocal();syncEvent(ev);render();}};
const clearAll=()=>{if(confirm('Alle Pyro-Ereignisse löschen?')){S.events=[];save();render();}};
const cnt=(team,type,phases)=>S.events.filter(e=>!e.dupl&&e.team===team&&(!type||e.type===type)&&(!phases||phases.includes(e.phase))).length;

// RENDER
const renderCount=()=>{
  const p=PHASES.find(x=>x.id===S.phase)||PHASES[0];
  const clkM=clockMin();
  const clkStr=clkM!=null?`${clkM}'`:'—';
  const hN=esc(S.heim||'Heim'),gN=esc(S.gast||'Gast');
  const phases=PHASES.map(ph=>`<button class="phase-btn${S.phase===ph.id?' on':''}" onclick="setPhase('${ph.id}')">${ph.label}</button>`).join('');
  const clock=p.hasMin?`<div class="clock-bar">
    <div>
      <div class="clock-val${S.clock.running?' tick':''}">${clkStr}</div>
      <div style="font-size:9px;opacity:.4;margin-top:1px">${S.clock.running?'Spieluhr läuft':'Gestoppt / Manuell'}</div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      ${S.clock.running
        ?`<button class="cbtn stop" onclick="stopClock()">■ Stop</button>`
        :`<button class="cbtn go" onclick="startClock('${S.phase}')">▶ Spieluhr</button>`}
      <div style="display:flex;flex-direction:column;gap:3px">
        <button onclick="adjMin(-1)" style="background:rgba(255,255,255,.1);border:none;border-radius:4px;color:#fff;cursor:pointer;padding:2px 8px;font-size:11px">-1'</button>
        <button onclick="adjMin(1)" style="background:rgba(255,255,255,.1);border:none;border-radius:4px;color:#fff;cursor:pointer;padding:2px 8px;font-size:11px">+1'</button>
      </div>
      ${!S.clock.running?`<input type="number" inputmode="numeric" value="${esc(S.clock.manual)}" oninput="S.clock.manual=this.value;renderContent()"
        placeholder="Min" style="width:54px;padding:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:7px;color:#fff;font-size:16px;text-align:center">`:''}
    </div>
  </div>`:'';
  const grid=PYRO.map(pt=>{
    const c=cnt(S.team,pt.id,null);
    const fl=[...flashIds].some(id=>{const e=S.events.find(x=>x.id===id);return e&&e.type===pt.id&&e.team===S.team;});
    return `<button class="pbtn${fl?' flash':''}" onclick="addEvent('${pt.id}')"
      style="border-color:${c>0?pt.color+'55':'rgba(255,255,255,.1)'};${c>0?`background:${pt.color}18;`:''}">
      <div class="p-emoji">${pt.emoji}</div>
      <div class="p-lbl" style="color:${c>0?pt.color:'rgba(255,255,255,.7)'}">${pt.label}</div>
      <div class="p-desc">${pt.desc}</div>
      <div class="p-cnt${c===0?' z':''}" style="color:${c>0?pt.color:'rgba(255,255,255,.3)'}">${c}</div>
    </button>`;
  }).join('');
  const recent=S.events.slice(0,5).map(ev=>{
    const pt=PYRO.find(x=>x.id===ev.type);
    const ph=PHASES.find(x=>x.id===ev.phase);
    return `<div class="erow${ev.dupl?' dp':''}">
      <span class="e-em">${pt?.emoji}</span>
      <div class="e-info">
        <span style="color:${ev.team==='HEIM'?'#4dde89':'#ff7070'};font-weight:700">${ev.team==='HEIM'?hN:gN}</span>
        <span style="opacity:.7"> ${pt?.label} · ${ph?.label}${ev.minute!=='—'?' · '+ev.minute+"'":''}
        </span><br><span class="e-who">${ev.spotter} ${ev.spotterName}${ev.dupl?' · DUPL':''}</span>
      </div>
      <button class="dbtn${ev.dupl?' ok':''}" onclick="togDupl('${ev.id}')">${ev.dupl?'✓ OK':'Dupl?'}</button>
    </div>`;
  }).join('');
  return `<div class="phase-bar">${phases}</div>${clock}
  <div class="team-tog">
    <button class="tbtn heim${S.team==='HEIM'?' on':''}" onclick="setTeam('HEIM')">${hN}</button>
    <button class="tbtn gast${S.team==='GAST'?' on':''}" onclick="setTeam('GAST')">${gN}</button>
  </div>
  <div class="pyro-grid">${grid}</div>
  <div class="recent"><div class="r-title">Letzte Ereignisse (alle Spotter)</div>
    ${recent||'<div style="font-size:11px;opacity:.3;padding:4px 0">Noch keine Ereignisse</div>'}
  </div>`;
};

const renderLog=()=>{
  const hN=esc(S.heim||'Heim'),gN=esc(S.gast||'Gast');
  const cards=S.events.map(ev=>{
    const pt=PYRO.find(x=>x.id===ev.type);
    const ph=PHASES.find(x=>x.id===ev.phase);
    const t=new Date(ev.ts).toLocaleTimeString('de-CH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    return `<div class="lcard ${ev.team.toLowerCase()}${ev.dupl?' dp':''}">
      <div class="lmain">
        <div>
          <span style="font-size:18px">${pt?.emoji}</span>
          <strong style="color:${ev.team==='HEIM'?'#4dde89':'#ff7070'}">${ev.team==='HEIM'?hN:gN}</strong>
          <strong> ${pt?.label}</strong>
          ${ev.dupl?'<span style="background:#e74c3c;color:#fff;border-radius:4px;padding:1px 5px;font-size:9px;font-weight:700;margin-left:4px">DUPL</span>':''}
        </div>
        <button class="dbtl${ev.dupl?' on':''}" onclick="togDupl('${ev.id}')">${ev.dupl?'✓ Gültig':'Duplikat'}</button>
      </div>
      <div class="ldtl">${ph?.label}${ev.minute!=='—'?' · '+ev.minute+"'":''}  ·  von ${ev.spotter} ${ev.spotterName}  ·  ${t}</div>
    </div>`;
  }).join('');
  return `<div class="log-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:12px;opacity:.5">${S.events.length} total · ${S.events.filter(e=>e.dupl).length} Duplikate</div>
      <button onclick="clearAll()" style="background:rgba(255,80,80,.2);color:#ff7070;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer">Löschen</button>
    </div>
    ${cards||'<div style="text-align:center;opacity:.3;padding:40px">Keine Ereignisse</div>'}
  </div>`;
};

const renderSummary=()=>{
  const hN=esc(S.heim||'Heim'),gN=esc(S.gast||'Gast');
  const teamBlock=(tid,name)=>`<div class="sc">
    <div class="sc-t" style="color:${tid==='HEIM'?'#4dde89':'#ff7070'}">${name}</div>
    ${PYRO.map(pt=>{const n=cnt(tid,pt.id,null);return`<div class="sr">
      <span>${pt.emoji} ${pt.label}</span><span class="sn${n===0?' z':''}" style="color:${n>0?pt.color:'#fff'}">${n}</span>
    </div>`;}).join('')}
  </div>`;
  const phaseDetail=PHASES.map(p=>{
    const evs=S.events.filter(e=>!e.dupl&&e.phase===p.id);
    if(!evs.length)return'';
    return`<div style="margin-bottom:8px">
      <div style="font-size:10px;font-weight:800;opacity:.45;text-transform:uppercase;margin-bottom:3px">${p.label}</div>
      ${['HEIM','GAST'].map(tid=>{
        const te=evs.filter(e=>e.team===tid);if(!te.length)return'';
        const parts=PYRO.map(pt=>{const n=te.filter(e=>e.type===pt.id).length;return n?`${pt.emoji}${pt.label}×${n}`:''}).filter(Boolean);
        return`<div style="font-size:11px;margin-bottom:1px"><span style="color:${tid==='HEIM'?'#4dde89':'#ff7070'};font-weight:700">${tid==='HEIM'?hN:gN}:</span> ${parts.join(' · ')}</div>`;
      }).join('')}
    </div>`;
  }).join('');
  const kmr=['HEIM','GAST'].map(tid=>{
    const name=tid==='HEIM'?hN:gN;
    const vor=S.events.filter(e=>!e.dupl&&e.team===tid&&e.phase==='VOR');
    const wahr=S.events.filter(e=>!e.dupl&&e.team===tid&&e.phase==='WAHR');
    const nach=S.events.filter(e=>!e.dupl&&e.team===tid&&e.phase==='NACH');
    const c=(a,t)=>a.filter(e=>e.type===t).length;
    return`<div style="margin-bottom:10px"><div style="color:${tid==='HEIM'?'#4dde89':'#ff7070'};font-weight:700;margin-bottom:2px">${name}</div>
      <div>Vor:     HLF ${c(vor,'HLF')} · Rauch ${c(vor,'RAUCH')} · FW ${c(vor,'FW')} · Böller ${c(vor,'BOEL')} · Blitzer ${c(vor,'BLITZ')}</div>
      <div>Während: HLF ${c(wahr,'HLF')} · Rauch ${c(wahr,'RAUCH')} · FW ${c(wahr,'FW')} · Böller ${c(wahr,'BOEL')} · Blitzer ${c(wahr,'BLITZ')}</div>
      <div>Nach:    HLF ${c(nach,'HLF')} · Rauch ${c(nach,'RAUCH')} · FW ${c(nach,'FW')} · Böller ${c(nach,'BOEL')} · Blitzer ${c(nach,'BLITZ')}</div>
    </div>`;
  }).join('');
  return`<div class="sum-wrap">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${teamBlock('HEIM',hN)}${teamBlock('GAST',gN)}</div>
    <div class="sc"><div class="sc-t">Nach Phase</div>${phaseDetail||'<div style="opacity:.3;font-size:12px">Noch keine Daten</div>'}</div>
    <div class="kmr"><div style="font-weight:800;opacity:.6;margin-bottom:4px;font-size:10px;letter-spacing:.5px">FÜR KMR-RAPPORT</div>${kmr}</div>
  </div>`;
};

const renderContent=()=>{
  const c=document.getElementById('mc');if(!c)return;
  if(S.view==='COUNT')c.innerHTML=renderCount();
  else if(S.view==='LOG')c.innerHTML=renderLog();
  else c.innerHTML=renderSummary();
};

const render=()=>{
  const app=document.getElementById('app');if(!app)return;
  // PASSWORD GATE
  if(!pyroAuth){
    app.innerHTML=`<div style="min-height:100vh;background:#0a1220;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px">
      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:44px;margin-bottom:10px">🎆</div>
        <div style="color:#fff;font-size:18px;font-weight:900">Pyro Live Counter</div>
        <div style="color:rgba(255,255,255,.4);font-size:12px;margin-top:3px">Luzerner Polizei</div>
      </div>
      <div style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:24px;width:100%;max-width:320px">
        <label style="display:block;font-size:10px;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Zugangscode</label>
        <input id="ppw" type="password" inputmode="numeric" placeholder="Passwort"
          onkeydown="if(event.key==='Enter')checkPyroPW()"
          style="width:100%;padding:13px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;font-size:20px;color:#fff;text-align:center;letter-spacing:6px;margin-bottom:12px;box-sizing:border-box;outline:none">
        <button onclick="checkPyroPW()" style="width:100%;padding:13px;background:#3498db;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer">Anmelden →</button>
      </div>
    </div>`;
    setTimeout(()=>document.getElementById('ppw')?.focus(),100);
    return;
  }
  if(S.setup){
    app.innerHTML=`<div class="setup">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:50px;margin-bottom:8px">🎆</div>
        <div style="font-size:24px;font-weight:900;margin-bottom:4px">Pyro Live Counter</div>
        <div style="font-size:12px;opacity:.4">Echtzeit-Zählung für mehrere Spotter</div>
      </div>
      <div class="fgrp"><label>Mein Spotter</label>
        <select id="ss" onchange="selSpot(this)">
          <option value="">— auswählen —</option>
          ${SPOTS.map(s=>`<option value="${s.id}|${s.n}">${s.id} — ${s.n}</option>`).join('')}
        </select></div>
      <div class="fgrp"><label>Heimteam</label><input id="ih" value="${esc(S.heim)}" oninput="S.heim=this.value"></div>
      <div class="fgrp"><label>Gastteam</label><input id="ig" value="${esc(S.gast)}" oninput="S.gast=this.value" placeholder="z.B. FC Winterthur"></div>
      <button class="sbtn" id="sb" onclick="go()" disabled>Live starten →</button>
      <p style="font-size:10px;opacity:.3;text-align:center;margin-top:14px">Alle Spotter öffnen diesen Link — geteilte Echtzeit-Daten</p>
    </div>`;
    return;
  }
  const ago=S.lastSync?Math.round((Date.now()-S.lastSync)/1000):99;
  const hN=esc(S.heim||'Heim'),gN=esc(S.gast||'Gast');
  app.innerHTML=`
    <div class="hdr">
      <div><h1>🎆 Pyro Live</h1><p>${hN} vs. ${gN} · ${matchDatum} · ${S.myId} ${S.myName}</p></div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="sync-dot${ago>8?' old':''}"></div>
        <div class="badge">${S.events.filter(e=>!e.dupl).length} Pyros</div>
      </div>
    </div>
    <div class="tabs">
      ${[['COUNT','🎯 Zähler'],['LOG','📋 Log'],['SUMMARY','📊 Report']].map(([id,l])=>
        `<button class="tab${S.view===id?' on':''}" onclick="setView('${id}')">${l}</button>`).join('')}
    </div>
    <div id="mc" style="flex:1;overflow-y:auto"></div>`;
  renderContent();
};

window.selSpot=el=>{const[id,...r]=el.value.split('|');S.myId=id;S.myName=r.join('|');const b=document.getElementById('sb');if(b)b.disabled=!id;};
window.checkPyroPW = checkPyroPW;
window.go=()=>{
  if(!S.myId)return;
  S.setup=false;
  // Lokalen Zustand wiederherstellen (Spieluhr + bisherige Events)
  try {
    const local=JSON.parse(localStorage.getItem(KEY)||'null');
    if(local){
      if(local.events?.length) S.events=local.events;
      if(local.heim) S.heim=local.heim;
      if(local.gast) S.gast=local.gast;
      // Spieluhr wiederherstellen
      if(local.clock?.running){
        S.clock=local.clock;
        if(clockT) clearInterval(clockT);
        clockT=setInterval(()=>{if(S.view==='COUNT')renderContent();},10000);
      }
    }
  }catch(e){}
  // Dann Server-Daten laden (mergt neue Events von anderen Geräten)
  load();
  pollT=setInterval(load,3000);
  render();
};
window.setPhase=id=>{S.phase=id;render();};
window.setTeam=id=>{S.team=id;render();};
window.setView=id=>{S.view=id;render();};
window.addEvent=addEvent;
window.togDupl=togDupl;
window.clearAll=clearAll;
window.startClock=startClock;
window.stopClock=stopClock;
window.adjMin=delta=>{
  if(S.clock.running){S.clock.startTs-=delta*60000;}
  else{S.clock.manual=String(Math.max(0,(parseInt(S.clock.manual)||0)+delta));}
  renderContent();
};
render();
</script>
</body>
</html>
